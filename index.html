<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loomi Test Photo</title>
<style>
body{font-family:Arial,sans-serif;background:#eee7dc;margin:0;padding:20px;text-align:center}
main{max-width:700px;margin:auto}
h1{margin-bottom:8px}
p{color:#666}
label{display:inline-block;background:#efcc5f;padding:14px 18px;border-radius:14px;font-weight:700;cursor:pointer}
input{display:none}
img{display:none;width:100%;margin-top:20px;border-radius:20px}
#status{margin-top:15px;font-weight:700}
</style>
</head>
<body>
<main>
<h1>Loomi test photo</h1>
<p>Cette page teste uniquement l’ouverture d’une image.</p>
<label for="file">Choisir une photo</label>
<input id="file" type="file" accept="image/*">
<div id="status">Aucune photo choisie</div>
<img id="preview" alt="Photo choisie">
</main>

<script>
const fileInput = document.getElementById('file');
const preview = document.getElementById('preview');
const status = document.getElementById('status');

fileInput.addEventListener('change', function () {
  const file = this.files && this.files[0];

  if (!file) {
    status.textContent = 'Aucune photo choisie';
    return;
  }

  const reader = new FileReader();

  reader.onload = function (event) {
    preview.src = event.target.result;
    preview.style.display = 'block';
    status.textContent = 'Photo affichée correctement';
  };

  reader.onerror = function () {
    status.textContent = 'Erreur pendant la lecture de la photo';
  };

  reader.readAsDataURL(file);
});
</script>
</body>
</html>
